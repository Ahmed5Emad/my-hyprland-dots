general {
    col.active_border = rgba(88938c77)
    col.inactive_border = rgba(3e494355)
}

misc {
    background_color = rgba(101412FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(101412FF)
        col.text = rgba(dfe4dfFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(dfe4df), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(dfe4df), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(dfe4df), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(7ad8b2AA) rgba(7ad8b277), match:pin 1
