<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <match target="font">
        <edit name="rgba" mode="assign">
            <const>none</const>
        </edit>
    </match>

    <!-- Map sans-serif to Noto Sans Arabic for Arabic text -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ar</string>
        </test>
        <test name="family">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Sans Arabic</string>
        </edit>
    </match>

    <!-- Map serif to Noto Naskh Arabic for Arabic text -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ar</string>
        </test>
        <test name="family">
            <string>serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Naskh Arabic</string>
        </edit>
    </match>

    <!-- Map monospace to Noto Sans Arabic for Arabic text (mono Arabic is rare and often looks like sans) -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ar</string>
        </test>
        <test name="family">
            <string>monospace</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Sans Arabic</string>
        </edit>
    </match>

    <!-- Fallback for generic 'ar' lang -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans</family>
            <family>Noto Sans Arabic</family>
        </prefer>
    </alias>

    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif</family>
            <family>Noto Naskh Arabic</family>
        </prefer>
    </alias>

</fontconfig>
